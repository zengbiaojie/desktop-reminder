<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Reminder</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="inAppReminder" class="inapp-reminder hidden"></div>

  <div class="app-shell">
    <header class="topbar panel">
      <div>
        <h1>桌面提醒</h1>
        <p>把功能拆开，用更清晰的分区工作流管理任务</p>
      </div>
      <div class="workspace-tabs" id="workspaceTabs">
        <button data-pane="overview" class="active">总览</button>
        <button data-pane="events">事件</button>
        <button data-pane="settings">设置</button>
      </div>
    </header>

    <main class="workspace-root">
      <section id="pane-overview" class="workspace-pane active">
        <section class="stats panel">
          <div class="stats-head">
            <h2>统计面板</h2>
          </div>
          <div id="statsPanel" class="stats-grid"></div>
        </section>

        <section class="today panel">
          <div class="today-head">
            <h2>今日面板</h2>
          </div>
          <div id="todayPanel" class="today-panel"></div>
        </section>
      </section>

      <section id="pane-events" class="workspace-pane">
        <div class="events-layout">
        <div id="creatorOverlay" class="creator-overlay hidden">
        <section id="creatorPanel" class="creator panel">
          <div class="creator-head">
            <h2 id="formTitle">新增事件</h2>
            <button type="button" id="closeCreatorBtn" class="ghost">关闭</button>
          </div>
          <form id="eventForm">
            <input type="hidden" id="eventId" />

            <div class="grid">
              <label>
                标题
                <input id="title" required maxlength="80" placeholder="例如：提交周报" />
              </label>
              <label>
                粒度
                <select id="priority">
                  <option value="urgent">紧急</option>
                  <option value="important">重要</option>
                  <option value="daily">日常</option>
                </select>
              </label>
              <label>
                DDL
                <input id="dueAt" type="datetime-local" />
              </label>
            </div>

            <label>
              标签（逗号分隔）
              <input id="tags" maxlength="200" placeholder="工作, 学习, 生活" />
            </label>

            <div class="recurrence-block">
              <label class="switch"><input id="recurrenceEnabled" type="checkbox" /><span>重复任务</span></label>
              <div class="recurrence-grid">
                <label>
                  频率
                  <select id="recurrenceFreq">
                    <option value="daily">每天</option>
                    <option value="weekly">每周</option>
                    <option value="monthly">每月</option>
                  </select>
                </label>
                <label>
                  间隔
                  <input id="recurrenceInterval" type="number" min="1" max="365" value="1" />
                </label>
                <label>
                  结束日期（可选）
                  <input id="recurrenceEndDate" type="date" />
                </label>
                <label>
                  最多次数（0=不限）
                  <input id="recurrenceMaxOccurrences" type="number" min="0" max="999" value="0" />
                </label>
              </div>
            </div>

            <div class="subtask-editor">
              <div class="subtask-head">
                <span>子任务清单</span>
                <div class="subtask-actions">
                  <input id="subtaskInput" maxlength="120" placeholder="输入子任务后点击添加" />
                  <button type="button" id="addSubtaskBtn" class="ghost">添加子任务</button>
                </div>
              </div>
              <div id="subtaskList" class="subtask-list"></div>
            </div>

            <label>
              备注
              <textarea id="note" rows="2" maxlength="220" placeholder="补充信息（可选）"></textarea>
            </label>

            <div class="form-actions">
              <button type="submit" id="saveBtn">保存事件</button>
              <button type="button" id="cancelEdit" class="ghost hidden">取消编辑</button>
            </div>
          </form>
        </section>
        </div>

        <section class="views panel">
          <div class="view-header">
            <h2>事件视图</h2>
            <button id="openCreatorBtn">+ 新增事件</button>
            <div class="tabs" id="viewTabs">
              <button data-view="list" class="active">列表</button>
              <button data-view="calendar">日历</button>
              <button data-view="table">表格</button>
              <button data-view="timeline">时间轴</button>
            </div>
          </div>

          <div class="toolbar">
            <input id="searchKeyword" placeholder="搜索标题/备注" />
            <select id="filterPriority">
              <option value="all">全部粒度</option>
              <option value="urgent">紧急</option>
              <option value="important">重要</option>
              <option value="daily">日常</option>
            </select>
            <select id="filterStatus">
              <option value="all">全部状态</option>
              <option value="active">进行中</option>
              <option value="completed">已完成</option>
              <option value="overdue">已逾期</option>
            </select>
            <input id="filterTag" placeholder="按标签筛选（精确匹配）" />
          </div>

          <div id="resultStat" class="result-stat"></div>
          <div id="viewContent" class="view-content"></div>
        </section>
        </div>
      </section>

      <section id="pane-settings" class="workspace-pane">
        <section class="panel settings-panel">
          <h2>应用设置</h2>
          <div class="settings-grid">
            <label class="switch"><input id="alwaysOnTop" type="checkbox" /><span>窗口置顶</span></label>
            <label class="switch"><input id="autoStart" type="checkbox" /><span>开机自启</span></label>
            <label>
              悬浮窗大小：<span id="bubbleSizeValue">46px</span>
              <input id="bubbleSize" type="range" min="32" max="80" step="1" value="46" />
            </label>
          </div>
        </section>

        <section class="panel settings-panel">
          <h2>提醒设置</h2>
          <div class="settings-grid">
            <label class="switch"><input id="reminderEnabled" type="checkbox" /><span>启用提醒</span></label>
            <label class="switch"><input id="reminderDay" type="checkbox" /><span>提前1天</span></label>
            <label class="switch"><input id="reminderHour" type="checkbox" /><span>提前1小时</span></label>
            <label class="switch"><input id="reminderTenMin" type="checkbox" /><span>提前10分钟</span></label>
            <label class="switch"><input id="reminderOverdue" type="checkbox" /><span>逾期提醒</span></label>
          </div>
        </section>
      </section>
    </main>
  </div>

  <template id="emptyTemplate">
    <div class="empty">暂无事件，先添加一个吧。</div>
  </template>

  <script src="./renderer.js"></script>
</body>
</html>
